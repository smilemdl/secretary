<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>事务助手</title>
    <link rel="stylesheet" href="/assets/styles.css" />
    <script defer src="/assets/app.js"></script>
  </head>
  <body>
    <div class="page-shell">
      <header class="hero">
        <p class="eyebrow">Secretary MVP</p>
        <h1>把事情录进去，再把它闭环。</h1>
        <p class="subhead">先用一句文字创建事务，页面会持续追踪你当前该处理的事项。</p>
      </header>

      <main class="layout">
        <section class="panel panel-command">
          <div class="panel-head">
            <h2>输入指令</h2>
            <span id="server-time" class="meta">--</span>
          </div>
          <form id="command-form" class="command-form">
            <textarea id="command-input" name="command" rows="3" placeholder="例如：明天下午3点提醒我交水电费" required></textarea>
            <div class="command-actions">
              <button type="submit">提交</button>
              <button id="help-button" type="button" class="secondary">帮助</button>
            </div>
          </form>
          <div id="reply-box" class="reply-box muted">这里会显示系统回显结果。</div>
        </section>

        <section class="panel panel-focus">
          <div class="panel-head">
            <h2>当前提醒</h2>
            <span class="meta">快捷动作默认作用于最近一条待处理事务</span>
          </div>
          <div id="focus-card" class="focus-card empty">当前没有需要立刻处理的事务。</div>
          <div class="quick-actions">
            <button data-command="完成">完成</button>
            <button data-command="15分钟后提醒" class="secondary">15分钟后提醒</button>
            <button data-command="今晚8点提醒" class="secondary">今晚8点提醒</button>
            <button data-command="改到明天9点" class="secondary">改到明天9点</button>
            <button data-command="取消" class="secondary danger">取消</button>
          </div>
        </section>

        <section class="panel panel-summary">
          <div class="panel-head">
            <h2>概览</h2>
            <span id="poll-note" class="meta">轮询中</span>
          </div>
          <div id="summary-grid" class="summary-grid"></div>
        </section>

        <section class="panel">
          <div class="panel-head">
            <h2>今日事务</h2>
            <button data-command="今天还有什么" class="text-button">刷新这部分</button>
          </div>
          <div id="today-list" class="list-wrap"></div>
        </section>

        <section class="panel">
          <div class="panel-head">
            <h2>未完成</h2>
            <button data-command="未完成" class="text-button">刷新这部分</button>
          </div>
          <div id="pending-list" class="list-wrap"></div>
        </section>

        <section class="panel panel-wide">
          <div class="panel-head">
            <h2>逾期与当前追踪</h2>
            <span class="meta">这些事务不会因为你看过页面就自动结束</span>
          </div>
          <div id="current-list" class="list-wrap"></div>
          <div id="overdue-list" class="list-wrap list-wrap-secondary"></div>
        </section>
      </main>
    </div>
  </body>
</html>
