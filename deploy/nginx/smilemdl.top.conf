server {
    server_name smilemdl.top;

    include /root/secretary/deploy/nginx/secretary-locations.conf;

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/smilemdl.top/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/smilemdl.top/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    if ($host = smilemdl.top) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    server_name smilemdl.top;
    return 404; # managed by Certbot
}